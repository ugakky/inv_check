<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>在庫・発注管理表</title>

  <style>
    :root {
      --bg: #fff7fb;
      --card: #ffffff;
      --main: #ff7fb8;
      --main-dark: #e85f9e;
      --text: #333;
      --muted: #777;
      --border: #f2c6d9;
      --danger: #ff5a7a;
      --warn: #f2a23a;
      --ok: #52b788;
      --shadow: 0 10px 30px rgba(255, 127, 184, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #ffe3f0 0, transparent 35%),
        linear-gradient(180deg, #fff7fb 0%, #ffffff 100%);
      min-height: 100vh;
    }

    header {
      padding: 32px 16px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: clamp(26px, 5vw, 42px);
      letter-spacing: 0.04em;
      color: var(--main-dark);
    }

    header p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    main {
      width: min(1100px, calc(100% - 24px));
      margin: 0 auto 40px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 18px;
      backdrop-filter: blur(8px);
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 18px;
      color: var(--main-dark);
    }

    input,
    button {
      font: inherit;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
      outline: none;
    }

    input:focus {
      border-color: var(--main);
      box-shadow: 0 0 0 4px rgba(255, 127, 184, 0.16);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      background: var(--main);
      color: white;
      transition: 0.15s ease;
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-1px);
      background: var(--main-dark);
    }

    button.sub {
      background: #fff;
      color: var(--main-dark);
      border: 1px solid var(--border);
    }

    button.danger {
      background: var(--danger);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .summary-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 6px 18px rgba(255, 127, 184, 0.08);
    }

    .summary-card span {
      display: block;
      color: var(--muted);
      font-size: 13px;
    }

    .summary-card strong {
      display: block;
      margin-top: 6px;
      font-size: 26px;
      color: var(--main-dark);
    }

    .tools {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .search-box {
      width: min(360px, 100%);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 920px;
    }

    th,
    td {
      padding: 12px 10px;
      border-bottom: 1px solid #f7d8e5;
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--main-dark);
      font-size: 13px;
      background: #fff0f7;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr.empty-stock {
      background: #fff1f4;
    }

    tr.low-stock {
      background: #fff9ee;
    }

    .category {
      display: inline-block;
      min-width: 72px;
      padding: 5px 9px;
      border-radius: 999px;
      background: #fff0f7;
      color: var(--main-dark);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
    }

    .row-input {
      padding: 8px 10px;
      max-width: 110px;
    }

    .stock-meter {
      width: 160px;
    }

    .bar {
      height: 10px;
      background: #f4dce7;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 6px;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--main);
      border-radius: 999px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 70px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }

    .status.ok {
      color: #0f6845;
      background: #dcf7eb;
    }

    .status.warn {
      color: #8a5200;
      background: #fff0d6;
    }

    .status.danger {
      color: #9b1230;
      background: #ffe1e8;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .last-checked {
      color: var(--muted);
      font-size: 13px;
      min-width: 140px;
    }

    .log-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      max-height: 360px;
      overflow: auto;
    }

    .log-item {
      border: 1px solid #f7d8e5;
      border-radius: 14px;
      padding: 10px 12px;
      background: #fff;
      font-size: 14px;
    }

    .log-item strong {
      color: var(--main-dark);
    }

    .empty-message {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 16px;
      background: #fff;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 20px;
    }

    @media (max-width: 760px) {
      .summary {
        grid-template-columns: 1fr 1fr;
      }

      .panel-title {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>在庫・発注管理表</h1>
    <p>現在数を入力すると、最大数まで補充するための発注数を自動計算します。</p>
  </header>

  <main>
    <section class="summary" aria-label="在庫サマリー">
      <div class="summary-card">
        <span>品目数</span>
        <strong id="totalItems">0</strong>
      </div>
      <div class="summary-card">
        <span>発注が必要</span>
        <strong id="orderItems">0</strong>
      </div>
      <div class="summary-card">
        <span>在庫なし</span>
        <strong id="emptyItems">0</strong>
      </div>
      <div class="summary-card">
        <span>最終チェック</span>
        <strong id="lastCheckSummary" style="font-size:16px;">未確認</strong>
      </div>
    </section>

    <section class="panel">
      <div class="panel-title">
        <h2>在庫一覧</h2>

        <div class="tools">
          <input id="searchInput" class="search-box" type="search" placeholder="名前・カテゴリで検索" />
          <button id="checkInventoryButton" type="button">在庫チェック</button>
        </div>
      </div>

      <div class="table-wrap">
        <table id="inventoryTable">
          <thead>
            <tr>
              <th>カテゴリ</th>
              <th>名前</th>
              <th>最大数</th>
              <th>現在数</th>
              <th>発注数</th>
              <th>残量</th>
              <th>状態</th>
              <th>前回チェック</th>
            </tr>
          </thead>
          <tbody id="inventoryBody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <div class="panel-title">
        <h2>在庫チェック履歴</h2>
        <button id="clearLogsButton" class="sub" type="button">ログを消す</button>
      </div>

      <div id="logList" class="log-list"></div>
    </section>
  </main>

  <footer>
    データはこのブラウザのlocalStorageに保存されます。サーバー送信はしていません。
  </footer>

  <script>
    const STORAGE_KEY = "embedded_inventory_order_checker_v1";

    // 可変
    const INVENTORY_MASTER = [
      { category: "お茶", name: "緑茶", max: 6 },
      { category: "お茶", name: "麦茶", max: 2 },
      { category: "お茶", name: "水", max: 6 },
      { category: "紅茶", name: "午後の紅茶ストレート", max: 4 },
      { category: "紅茶", name: "午後の紅茶レモン", max: 4 },
      { category: "紅茶", name: "午後の紅茶ミルク", max: 4 },
      { category: "ジュース", name: "オレンジ", max: 6 },
      { category: "ジュース", name: "りんご", max: 6 },
      { category: "ジュース", name: "グレフル", max: 6 },
      { category: "割材", name: "コーラ", max: 36 },
      { category: "割材", name: "ジンジャー", max: 36 },
      { category: "割材", name: "トニック", max: 36 },
      { category: "割材", name: "炭酸水", max: 48 },
      { category: "お酒", name: "テキーラ", max: 1.5 },
      { category: "お酒", name: "ウォッカ", max: 0.8 },
      { category: "お酒", name: "コカレロ", max: 0.5 },
      { category: "お酒", name: "ジン", max: 0.5 },
      { category: "その他", name: "その他", max: 0.3 }
    ];
    // 可変

    const state = { currentStocks: {}, lastCheckedAt: "", logs: [] };
    const $ = (id) => document.getElementById(id);

    function roundStock(value) { return Math.round(value * 10) / 10; }
    function parseStock(value) {
      const n = Number(value);
      return Number.isFinite(n) && n >= 0 ? roundStock(n) : 0;
    }
    function formatStock(value) {
      return Number(value).toLocaleString("ja-JP", { maximumFractionDigits: 1 });
    }
    function formatDate(iso) {
      if (!iso) return "未確認";
      return new Intl.DateTimeFormat("ja-JP", {
        year:"numeric", month:"2-digit", day:"2-digit",
        hour:"2-digit", minute:"2-digit", second:"2-digit"
      }).format(new Date(iso));
    }
    function escapeHtml(value) {
      return String(value).replaceAll("&","&amp;").replaceAll("<","&lt;")
        .replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }
    function getCurrent(name) { return parseStock(state.currentStocks[name] ?? 0); }
    function getOrder(current, max) { return roundStock(Math.max(0, max-current)); }
    function getPercent(current,max) { return max>0 ? Math.min(100,Math.round(current/max*100)) : 0; }
    function getStatus(current,max) {
      if (current<=0) return {text:"在庫なし",className:"danger",rowClass:"empty-stock"};
      if (current<max) return {text:"発注必要",className:"warn",rowClass:"low-stock"};
      return {text:"補充不要",className:"ok",rowClass:""};
    }
    function loadData() {
      try {
        const p=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
        state.currentStocks=p.currentStocks&&typeof p.currentStocks==="object"?p.currentStocks:{};
        state.lastCheckedAt=typeof p.lastCheckedAt==="string"?p.lastCheckedAt:"";
        state.logs=Array.isArray(p.logs)?p.logs:[];
      } catch { state.currentStocks={}; state.lastCheckedAt=""; state.logs=[]; }
    }
    function saveData(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); }

    function renderSummary(){
      let orderItems=0, emptyItems=0;
      INVENTORY_MASTER.forEach(item=>{
        const current=getCurrent(item.name);
        if(getOrder(current,item.max)>0) orderItems++;
        if(current<=0) emptyItems++;
      });
      $("totalItems").textContent=INVENTORY_MASTER.length;
      $("orderItems").textContent=orderItems;
      $("emptyItems").textContent=emptyItems;
      $("lastCheckSummary").textContent=formatDate(state.lastCheckedAt);
    }

    function renderTable(){
      const keyword=$("searchInput").value.trim().toLowerCase();
      const items=INVENTORY_MASTER.filter(i=>`${i.category} ${i.name}`.toLowerCase().includes(keyword));
      $("inventoryBody").innerHTML=items.map(item=>{
        const current=getCurrent(item.name), order=getOrder(current,item.max);
        const status=getStatus(current,item.max), percent=getPercent(current,item.max);
        return `<tr data-name="${escapeHtml(item.name)}" class="${status.rowClass}">
          <td><span class="category">${escapeHtml(item.category)}</span></td>
          <td><strong>${escapeHtml(item.name)}</strong></td>
          <td><strong>${escapeHtml(formatStock(item.max))}</strong></td>
          <td><input class="row-input js-current" type="number" min="0" step="0.1" inputmode="decimal" value="${escapeHtml(current)}"></td>
          <td><span class="status ${order===0?'ok':'danger'}">${escapeHtml(formatStock(order))}</span></td>
          <td><div class="stock-meter"><strong>${escapeHtml(formatStock(current))} / ${escapeHtml(formatStock(item.max))}</strong><div class="bar"><span style="width:${percent}%"></span></div></div></td>
          <td><span class="status ${status.className}">${status.text}</span></td>
          <td class="last-checked">${formatDate(state.lastCheckedAt)}</td>
        </tr>`;
      }).join("");
    }

    function renderLogs(){
      if(!state.logs.length){
        $("logList").innerHTML='<div class="empty-message">まだ在庫チェック履歴がありません。</div>';
        return;
      }
      $("logList").innerHTML=state.logs.map(log=>{
        const lines=log.items.filter(i=>i.orderQuantity>0).map(i=>
          `<div><strong>${escapeHtml(i.name)}</strong>：現在 ${escapeHtml(formatStock(i.current))} ／ 最大 ${escapeHtml(formatStock(i.max))} ／ 発注 ${escapeHtml(formatStock(i.orderQuantity))}</div>`
        ).join("");
        return `<div class="log-item"><div style="color:#777;font-size:12px;">チェック日時：${formatDate(log.checkedAt)}</div>${lines||'<div><strong>発注が必要な品目はありません。</strong></div>'}</div>`;
      }).join("");
    }
    function render(){ renderSummary(); renderTable(); renderLogs(); }

    $("inventoryBody").addEventListener("input",e=>{
      const input=e.target.closest(".js-current");
      if(!input) return;

      const row=input.closest("tr");
      const name=row.dataset.name;
      const master=INVENTORY_MASTER.find(item=>item.name===name);
      if(!master) return;

      const current=parseStock(input.value);
      const order=getOrder(current,master.max);
      const status=getStatus(current,master.max);
      const percent=getPercent(current,master.max);

      state.currentStocks[name]=current;
      saveData();
      renderSummary();

      const cells=row.querySelectorAll("td");
      cells[4].innerHTML=`<span class="status ${order===0?'ok':'danger'}">${escapeHtml(formatStock(order))}</span>`;
      cells[5].innerHTML=`<div class="stock-meter"><strong>${escapeHtml(formatStock(current))} / ${escapeHtml(formatStock(master.max))}</strong><div class="bar"><span style="width:${percent}%"></span></div></div>`;
      cells[6].innerHTML=`<span class="status ${status.className}">${status.text}</span>`;
      row.className=status.rowClass;
    });

    $("inventoryBody").addEventListener("keydown",e=>{
      const input=e.target.closest(".js-current");
      if(!input || e.key!=="Enter") return;

      e.preventDefault();

      const inputs=Array.from(
        document.querySelectorAll("#inventoryBody .js-current")
      );
      const currentIndex=inputs.indexOf(input);
      const nextInput=inputs[(currentIndex+1)%inputs.length];

      if(nextInput){
        nextInput.focus();
        nextInput.select();
      }
    });

    $("searchInput").addEventListener("input",renderTable);

    $("checkInventoryButton").addEventListener("click",()=>{
      document.querySelectorAll("#inventoryBody tr").forEach(row=>{
        const input=row.querySelector(".js-current");
        if(input) state.currentStocks[row.dataset.name]=parseStock(input.value);
      });
      const checkedAt=new Date().toISOString();
      const items=INVENTORY_MASTER.map(item=>{
        const current=getCurrent(item.name);
        return {category:item.category,name:item.name,current,max:item.max,orderQuantity:getOrder(current,item.max)};
      });
      state.lastCheckedAt=checkedAt;
      state.logs.unshift({checkedAt,items});
      state.logs=state.logs.slice(0,50);
      saveData(); render(); alert("在庫チェックを保存しました。");
    });

    $("clearLogsButton").addEventListener("click",()=>{
      if(!confirm("在庫チェック履歴をすべて削除しますか？")) return;
      state.logs=[]; state.lastCheckedAt=""; saveData(); render();
    });

    loadData(); render();
  </script>
</body>
</html>
